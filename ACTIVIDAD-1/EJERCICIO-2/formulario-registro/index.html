<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
</head>
<body>

    <h1>Registro de Participantes</h1>
    <p>Completa el formulario para inscribirte en la actividad académica.</p>

    <form>

    <label>Nombre completo:</label><br>
    <input type="text" name="nombre"><br><br>

    <label>Correo electrónico:</label><br>
    <input type="email" name="correo"><br><br>

    <label>Teléfono:</label><br>
    <input type="tel" name="telefono"><br><br>

    <label>Fecha de nacimiento:</label><br>
    <input type="date" name="fecha"><br><br>

    <label>Género:</label><br>
    <input type="radio" name="genero" value="masculino"> Masculino
    <input type="radio" name="genero" value="femenino"> Femenino<br><br>

    <label>Áreas de interés:</label><br>
    <input type="checkbox" value="html"> HTML
    <input type="checkbox" value="css"> CSS
    <input type="checkbox" value="javascript"> JavaScript<br><br>

    <input type="submit" value="Registrarse">

</form>

</body>
</html>
